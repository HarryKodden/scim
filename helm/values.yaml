# Default values for scim.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: harrykodden/scim
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

environment:
- name: LOGLEVEL
  value: ERROR
- name: BASE_PATH
  value: /
- name: API_KEY
  value: chooseyourownsecret
# Alternative plugin: File Storage (= default)
- name: DATA_PATH
  value: /tmp

# RFC 9967 Security Event Tokens (SET) — see TODO.md
#- name: SET_ISSUER
#  value: https://scim.example.com
#- name: SET_AUDIENCE
#  value: https://receiver.example.com
#- name: SET_PUSH_URL
#  value: https://receiver.example.com/scim/events
#- name: SET_PUSH_TOKEN
#- name: SET_SIGNING_SECRET
#- name: SET_SIGNING_ALGORITHM
#  value: "HS256"
#- name: SET_PUSH_REQUIRE_TLS
#  value: "true"
#  value: changeme
#- name: EVENT_MODE
#  value: notice
#- name: ASYNC_REQUEST
#  value: none
#- name: SET_FEEDS_ENABLED
#  value: "true"
#- name: SET_GROUP_AS_FEED
#  value: "true"
#- name: SET_POLL_ENABLED
#  value: "false"
#- name: SET_POLL_MAX_EVENTS
#  value: "10000"


# Alternative plugin: SCIM Forward
#- name: SCIM_FORWARD_URL
#  value: https://scim.example.com/api/v2
#- name: SCIM_FORWARD_KEY
#  value: apikeyofthatserver

# Alternative plugin: database persistancy
#- name: DATABASE_URL
#  value: sqlconnectstring

# Alternative plugin: JumpCloud
#- name: JUMPCLOUD_URL
#  value: https://jumpcloud.com/xxx
#- name: JUMPCLOUD_KEY
#  value: <yourapikey>

# Alternative plugin: MongoDB
#- name: MONGO_DB
#  value: mongoconnectstring

# Alternative plugin: File Storage
#- name: DATA_PATH
#  value: /mnt/data/xxx

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {} # fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - "ALL"
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
  - host: chart-example.local
    paths:
    - path: /
      pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

  # Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: # - name: foo

#  mountPath: "/tmp"
#  readOnly: False

nodeSelector: {}

tolerations: []

affinity: {}
